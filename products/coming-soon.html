<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#b8956a;--gold-lt:#d4b896;--cream:#f5f2ec;--ink:#1a1814;--ink-dark:#13110e}
body{font-family:'Inter',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:99;display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:rgba(8,8,8,.55);backdrop-filter:blur(22px)}
.nav-logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:20px;letter-spacing:.28em;color:var(--cream);text-transform:uppercase;text-decoration:none}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-link{color:rgba(245,242,236,.6);text-decoration:none;font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:.2s}
.nav-link:hover{color:var(--cream)}
.nav-cta{border:1px solid rgba(245,242,236,.4);padding:7px 18px;color:var(--cream) !important}
.nav-cta:hover{background:rgba(255,255,255,.08) !important}
.lang-switch{display:flex;align-items:center;gap:6px}
.lang-btn{background:none;border:none;cursor:pointer;padding:2px;line-height:0;border-radius:3px;opacity:1;transition:transform .15s;flex-shrink:0}
.lang-btn:hover{transform:scale(1.12)}

/* LAYOUT */
.wrap{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;padding-top:64px}
.left{padding:64px 56px 56px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid rgba(245,242,236,.07)}
.right{background:var(--ink-dark);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:calc(100vh - 64px)}

/* LEFT CONTENT */
.eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:rgba(245,242,236,.3);margin-bottom:40px}
.badge{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(184,149,106,.3);padding:7px 14px;margin-bottom:28px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.badge-txt{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,4vw,52px);font-weight:300;line-height:1.05;margin-bottom:18px;letter-spacing:-.01em;color:var(--cream)}
h1 em{font-style:italic;color:var(--gold)}
.subtitle{font-size:13px;color:rgba(245,242,236,.62);line-height:1.85;max-width:380px;margin-bottom:32px}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.tag{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,242,236,.5);padding:4px 10px;border:1px solid rgba(245,242,236,.15)}
.tag-gold{color:var(--gold);border-color:rgba(184,149,106,.35)}
.cta-group{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:44px}
.btn-gold{padding:13px 30px;background:var(--gold);color:#fff;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;border:none;cursor:pointer;transition:.2s;text-decoration:none;display:inline-block}
.btn-gold:hover{background:var(--gold-lt)}
.btn-outline{padding:13px 30px;background:transparent;color:var(--cream);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;border:1px solid rgba(245,242,236,.45);cursor:pointer;transition:.2s;text-decoration:none;display:inline-block}
.btn-outline:hover{border-color:var(--cream)}
.divider{width:40px;height:1px;background:rgba(184,149,106,.3);margin-bottom:28px}
.info-row{display:flex;gap:36px;flex-wrap:wrap;margin-bottom:48px}
.info-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,242,236,.3);margin-bottom:5px}
.info-value{font-size:13px;color:rgba(245,242,236,.82);letter-spacing:.01em}
.info-value strong{color:var(--gold);font-weight:400}
.footer-note{font-size:10px;color:rgba(245,242,236,.2);letter-spacing:.06em}

/* RIGHT / IMAGE */
.deco-ring{position:absolute;border-radius:50%;border:1px solid rgba(184,149,106,.07);top:50%;left:50%;transform:translate(-50%,-50%)}
.img-frame{width:min(300px,45vw);height:min(300px,45vw);border:1px solid rgba(184,149,106,.2);display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
.img-frame::before{content:'';position:absolute;inset:-8px;border:1px solid rgba(184,149,106,.08)}
.img-frame img{width:85%;height:85%;object-fit:contain}
.product-label{margin-top:28px;text-align:center;z-index:2;position:relative}
.product-label-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;font-style:italic;color:var(--cream);margin-bottom:6px}
.product-label-sector{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(184,149,106,.7)}

/* NOT FOUND */
.not-found{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px}
.not-found h2{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--cream);margin-bottom:12px}
.not-found p{font-size:13px;color:rgba(245,242,236,.5);margin-bottom:24px}

@media(max-width:700px){
  nav{padding:16px 24px}
  .wrap{grid-template-columns:1fr;padding-top:60px}
  .left{padding:40px 24px 48px;order:2}
  .right{min-height:55vw;order:1}
  .img-frame{width:44vw;height:44vw}
}
</style>
